<!DOCTYPE html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Libelius_logo_color_HQ-01.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libellius InsightHub</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        // TOTO JE KĽÚČOVÉ: Povie Tailwindu, aby sledoval triedu "dark" na <html> elemente
        darkMode: 'class', 
        theme: {
          extend: {
            colors: {
              brand: '#B81547',
            }
          }
        }
      }
    </script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        /* Odstránili sme natvrdo nastavenú bielu, aby ju mohol ovládať React/Tailwind */
        margin: 0;
        padding: 0;
      }
      
      /* Zabezpečíme plynulý prechod farieb pri prepínaní */
      html {
        transition: background-color 0.3s ease;
      }

      /* Animácie */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes rowSlideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
      .animate-row-slide-in {
        opacity: 0;
        animation: rowSlideIn 0.5s ease-out forwards;
      }

      /* Skrytie scrollbaru */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Vlastná farba výberu textu */
      ::selection {
        background-color: #B81547;
        color: white;
      }
    </style>
  </head>
  
  <body class="bg-zinc-50 dark:bg-zinc-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
